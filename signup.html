<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ELEWA — Signup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="card mx-auto" style="max-width:720px;">
      <div class="card-body">
        <h2 class="card-title">Create profile</h2>
        <form id="signupForm">
          <div class="mb-3">
            <label class="form-label">Full name</label>
            <input name="name" id="name" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Age group</label>
            <select name="ageGroup" id="ageGroup" class="form-select" required>
              <option value="5-12">5–12 years</option>
              <option value="13-17">13–17 years</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Language</label>
            <select name="language" id="language" class="form-select" required>
              <option value="kiswahili">Kiswahili</option>
              <option value="english">English</option>
              <option value="motherTongue">Mother Tongue</option>
            </select>
          </div>

          <div class="mb-3 d-none" id="motherTongueWrap">
            <label class="form-label">Select Mother Tongue</label>
            <select name="motherTongue" id="motherTongue" class="form-select"></select>
          </div>

          <div class="mb-3">
            <label class="form-label">Learning options</label><br>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" id="reading" name="learning" value="reading">
              <label class="form-check-label" for="reading">Reading</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" id="writing" name="learning" value="writing">
              <label class="form-check-label" for="writing">Writing</label>
            </div>
          </div>

          <button class="btn btn-success w-100" type="submit">Continue to Dashboard</button>
        </form>
        <div id="msg" class="mt-3"></div>
      </div>
    </div>
  </div>

<script>
async function loadLanguages() {
  const res = await fetch('/api/languages');
  const json = await res.json();
  const sel = document.getElementById('motherTongue');
  json.languages.forEach(l => {
    const opt = document.createElement('option');
    opt.value = l;
    opt.textContent = l;
    sel.appendChild(opt);
  });
}
document.addEventListener('DOMContentLoaded', loadLanguages);

document.getElementById('language').addEventListener('change', (e) => {
  const wrap = document.getElementById('motherTongueWrap');
  wrap.classList.toggle('d-none', e.target.value !== 'motherTongue');
});

document.getElementById('signupForm').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const form = ev.target;
  const data = new FormData(form);
  const learning = [];
  form.querySelectorAll('input[name="learning"]:checked').forEach(i => learning.push(i.value));
  const payload = {
    name: data.get('name'),
    ageGroup: data.get('ageGroup'),
    language: data.get('language'),
    motherTongue: data.get('motherTongue'),
    learning
  };
  const res = await fetch('/api/signup', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if (res.ok) {
    sessionStorage.setItem('elewa_user', json.user.id);
    window.location.href = '/dashboard.html';
  } else {
    document.getElementById('msg').textContent = json.message || 'Signup failed';
  }
});
</script>
</body>
</html>
